name: Build Aransh APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space & Memory
        # Using 'dd' instead of 'fallocate' to avoid "Text file busy" error
        # This gives the runner 4GB of extra virtual RAM for heavy compilation
        run: |
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl vm.swappiness=10

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 zip unzip zlib1g-dev libffi-dev libssl-dev libtinfo5 libncursesw5 libncurses5-dev libncursesw5-dev libtinfo5 cmake openjdk-17-jdk autoconf automake libtool pkg-config
          # Using specific versions for Python 3.12/2026 environment stability
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # fresh build - no clean needed
          yes y | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aransh-AI-APK
          path: bin/*.apk
