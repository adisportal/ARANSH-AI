Name: Build Aransh APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space & Memory
        # This creates extra virtual RAM (Swap) to prevent "Broken Pipe" crashes
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 zip unzip zlib1g-dev libffi-dev libssl-dev libtinfo5 libncursesw5 libncurses5-dev libncursesw5-dev libtinfo5 cmake openjdk-17-jdk autoconf automake libtool pkg-config
          # Cython 0.29.33 is the most stable for Kivy cross-compilation
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # We skip 'clean' because GitHub runners are always fresh
          # 'yes y' handles the Android SDK licenses automatically
          yes y | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aransh-AI-APK
          path: bin/*.apk

