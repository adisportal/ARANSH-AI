name: Build Aransh APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Updated to v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 zip unzip zlib1g-dev libffi-dev libssl-dev libtinfo5 libncursesw5 libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython==0.29.33
          
      - name: Build with Buildozer
        run: yes y | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4  # Fixed the v3 error here!
        with:
          name: Aransh-AI-APK
          path: bin/*.apk
