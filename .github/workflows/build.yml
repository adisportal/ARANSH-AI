name: Build Aransh APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Tools
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 zip unzip zlib1g-dev libffi-dev libssl-dev libtinfo5 libncursesw5 libncurses5-dev libncursesw5-dev libtinfo5 cmake openjdk-17-jdk
          pip install --user --upgrade buildozer cython==0.29.33

      - name: Run Buildozer
        run: |
          # This line fixes the 'Exit Code 100' permission bug
          export PATH=$PATH:$HOME/.local/bin
          yes y | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aransh-APK
          path: bin/*.apk
